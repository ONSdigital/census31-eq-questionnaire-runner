---
# Configuration file for MegaLinter
#
# See all available variables at https://megalinter.io/latest/config-file/ and in
# linters documentation
# all, none, or list of linter keys

# If you use ENABLE variable, all other languages/formats/tooling-formats will
# be disabled by default
# Have decided not to enable the Python linter as has been recommended in point 7
# in the [python template readme](https://github.com/ONSdigital/ons-python-template#3-megalinter)
ENABLE:
  - ACTION
  - DOCKERFILE
  # - EDITORCONFIG
  # - HTML
  - JAVASCRIPT
  - JSON
  - MARKDOWN
  - YAML

DISABLE_LINTERS:
  - JAVASCRIPT_STANDARD # Disabled because its rules conflict with our rules set up in ESLint

# JAVASCRIPT_ES_CLI_EXECUTABLE and JAVASCRIPT_ES_PRE_COMMANDS are required to run ESLint v9
# There are compatibility issues with ESLint v10 at the moment and MegaLinter runs v10 by default
JAVASCRIPT_ES_CLI_EXECUTABLE: # Forces MegaLinter to use the local ESLint binary (v9)
  - node_modules/.bin/eslint

JAVASCRIPT_ES_PRE_COMMANDS: # Needed because otherwise it will fail in the GitHub action because node_modules/.bin/eslint won't exist in that environment
  - command: npm ci --include=dev
    cwd: workspace

FORMATTERS_DISABLE_ERRORS: false
SHOW_ELAPSED_TIME: true
FLAVOR_SUGGESTIONS: false

ACTION_ZIZMOR_UNSECURED_ENV_VARIABLES:
  - GITHUB_TOKEN
