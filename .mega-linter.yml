---
# Configuration file for MegaLinter
#
# See all available variables at https://megalinter.io/latest/config-file/ and in
# linters documentation
# all, none, or list of linter keys

# If you use ENABLE variable, all other languages/formats/tooling-formats will
# be disabled by default
ENABLE:
  - ACTION
  - DOCKERFILE
  # - EDITORCONFIG
  # - HTML
  # - JAVASCRIPT
  - JSON
  - MARKDOWN
  - PYTHON
  - YAML

FORMATTERS_DISABLE_ERRORS: false
SHOW_ELAPSED_TIME: true
FLAVOR_SUGGESTIONS: false

# Install Python project dependencies for type checkers and linters
PYTHON_MYPY_PRE_COMMANDS:
  - command: poetry install --no-root
    cwd: workspace

PYTHON_PYRIGHT_PRE_COMMANDS:
  - command: poetry install --no-root
    cwd: workspace

PYTHON_PYLINT_PRE_COMMANDS:
  - command: poetry install --no-root
    cwd: workspace

# Keep flake8 aligned with repository linting settings.
PYTHON_FLAKE8_ARGUMENTS: "--max-line-length=120 --extend-ignore=E203"

# Keep Bandit focused on application code; test asserts are expected.
PYTHON_BANDIT_ARGUMENTS: "-x tests,node_modules"

ACTION_ZIZMOR_UNSECURED_ENV_VARIABLES:
  - GITHUB_TOKEN
