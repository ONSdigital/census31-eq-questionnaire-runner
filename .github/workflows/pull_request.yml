name: PR

on:
  pull_request:
    branches:
      - "main"
      - "v3-census"

concurrency:
  group: '${{ github.head_ref }}'
  cancel-in-progress: true

jobs:
  python-dependencies:
    permissions:
      contents: 'read'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: |
          echo "PYTHON_VERSION=$(cat .python-version)" >> $GITHUB_ENV
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
        with:
          version: 2.1.2
          virtualenvs-create: true
      - name: Install virtual environment
        run: |
          sudo apt-get install libsnappy-dev
          poetry install
  node-dependencies:
    permissions:
      contents: 'read'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file : ".nvmrc"
      - name: Install npm deps
        run: npm install
  lint:
    permissions:
      contents: 'read'
    needs: [python-dependencies, node-dependencies]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: |
          echo "PYTHON_VERSION=$(cat .python-version)" >> $GITHUB_ENV
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: ".nvmrc"
      - name: Write app version
        run: printf "${{ github.event.pull_request.head.sha }}" > .application-version
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
        with:
          version: 2.1.2
          virtualenvs-create: true
      - name: Install virtual environment
        run: poetry install
      - name: Compile translations
        run: make translate
      - name: Running translation tests
        run: poetry run python -m scripts.extract_translation_templates --test
      - name: Python linting
        run: make lint-python
      - name: Install npm deps
        run: npm install
      - name: Functional tests spec lint
        run: ./scripts/lint_functional_test_specs.sh
      - name: Javascript linting
        run: make lint-js
      - name: HTML linting
        run: make lint-html
  test-unit:
    if: "!contains(github.event.pull_request.labels.*.name, 'skip-tests-unit')"
    permissions:
      contents: 'read'
    needs: python-dependencies
    runs-on: ubuntu-22.04
    env:
      CI: True
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: |
          echo "PYTHON_VERSION=$(cat .python-version)" >> $GITHUB_ENV
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
        with:
          version: 2.1.2
          virtualenvs-create: true
      - name: Install virtual environment
        run: poetry install
      - name: Install apt dependencies
        run: |
            sudo apt-get install libsnappy-dev libgconf-2-4 jq
            # Install wkthtmltopdf with patched Qt
            sudo apt-get install -y xfonts-base xfonts-75dpi
            wget https://github.com/wkhtmltopdf/packaging/releases/download/0.12.6-1/wkhtmltox_0.12.6-1.bionic_amd64.deb
            sudo dpkg -i wkhtmltox_0.12.6-1.bionic_amd64.deb
      - name: Write app version
        run: printf "${{ github.event.pull_request.head.sha }}" > .application-version
      - name: Install dotenv plugin
        run: poetry self add poetry-plugin-dotenv@2.9.0
      - name: Load templates
        run: make load-design-system-templates
      - name: Compile translations
        run: make translate
      - name: Link env vars
        run: ln -sf .development.env .env
      - name: Running unit tests
        run: make test-unit
  validate-schemas:
    permissions:
      contents: 'read'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: |
          echo "PYTHON_VERSION=$(cat .python-version)" >> $GITHUB_ENV
      - name: Run validator
        run: ./scripts/run_validator.sh
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
        with:
          version: 2.1.2
          virtualenvs-create: true
      - name: Running schema validation
        run: make validate-test-schemas
  test-functional:
    if: "!contains(github.event.pull_request.labels.*.name, 'skip-tests-acceptance')"
    permissions:
      contents: 'read'
    needs: [python-dependencies, node-dependencies]
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    env:
      EQ_RUN_FUNCTIONAL_TESTS_HEADLESS: True
      # :TODO: Revisit & update when 2 instances can be used without adverse effects
      EQ_FUNCTIONAL_TEST_MAX_INSTANCES: 2
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: ".nvmrc"
      - run: |
          echo "PYTHON_VERSION=$(cat .python-version)" >> $GITHUB_ENV
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
        with:
          version: 2.1.2
          virtualenvs-create: true
      - name: Install virtual environment
        run: poetry install
      - name: Install npm deps
        run: npm install
      - name: Docker compose
        run: docker compose --version && RUNNER_ENV_FILE=.functional-tests.env docker compose up --build -d
      - name: Functional tests
        run: make test-functional
      - name: Docker compose shutdown
        run: RUNNER_ENV_FILE=.functional-tests.env docker compose kill
#  docker-push:
#    permissions:
#      contents: 'read'
#      id-token: 'write'
#    runs-on: ubuntu-22.04
#    steps:
#      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
#      - id: auth
#        name: Authenticate to Google Cloud
#        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
#        with:
#          token_format: 'access_token'
#          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
#          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set Tag and SHA
        run: |
          CLEAN_TAG=$(echo "${{ github.event.pull_request.head.ref  }}"  | tr / -)
          echo "TAG=$CLEAN_TAG" >> $GITHUB_ENV
          echo "SHA=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
      - name: Write app version
        run: |
          echo "Writing SHA $SHA to .application_version"
          printf $SHA > .application-version
#      - name: Build
#        run: docker build -t ${{ secrets.GAR_LOCATION }}/${{ secrets.GAR_PROJECT_ID }}/docker-images/census31-eq-questionnaire-runner:$TAG .
#      - name: Push to GAR
#        run: |
#          gcloud auth configure-docker ${{ secrets.GAR_LOCATION }}
#          echo "Pushing to GAR with tag $TAG"
#          docker push ${{ secrets.GAR_LOCATION }}/${{ secrets.GAR_PROJECT_ID }}/docker-images/census31-eq-questionnaire-runner:$TAG
  required-gate:
    permissions: {}
    runs-on: ubuntu-22.04
    if: always()
    needs: [lint, test-unit, validate-schemas, test-functional]
    steps:
      - name: Check required jobs passed
        env:
          LINT: ${{ needs.lint.result }}
          VALIDATE_SCHEMAS: ${{ needs.validate-schemas.result }}
          TEST_UNIT: ${{ needs.test-unit.result }}
          TEST_FUNCTIONAL: ${{ needs.test-functional.result }}
        run: |
          echo "lint=$LINT"
          echo "validate-schemas=$VALIDATE_SCHEMAS"
          echo "test-unit=$TEST_UNIT"
          echo "test-functional=$TEST_FUNCTIONAL"

          [ "$LINT" = "success" ] || { echo "::error::lint failed or was skipped unexpectedly"; exit 1; }
          [ "$VALIDATE_SCHEMAS" = "success" ] || { echo "::error::validate-schemas failed or was skipped unexpectedly"; exit 1; }

          [ "$TEST_UNIT" = "success" ] || { echo "::error::test-unit must run and pass before merge (result: $TEST_UNIT). If skip-tests-unit is set, remove the label and rerun checks."; exit 1; }
          [ "$TEST_FUNCTIONAL" = "success" ] || { echo "::error::test-functional must run and pass before merge (result: $TEST_FUNCTIONAL). If skip-tests-acceptance is set, remove the label and rerun checks."; exit 1; }

          echo "All required checks passed!"
