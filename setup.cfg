[tool:pytest]
norecursedirs = node_modules
log_cli_level = WARNING
filterwarnings=
	ignore:Using or importing the ABCs
    ignore:.*formatargspec.*:DeprecationWarning
    ignore:.*isAlive.*:PendingDeprecationWarning

[flake8]
max-line-length = 160
exclude =
    .venv,
    node_modules,
    .git,
    __pycache__
